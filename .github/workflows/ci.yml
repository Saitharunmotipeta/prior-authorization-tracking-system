name: Prior Authorization CI Pipeline

on:
  push:
    branches:
      - saitharun

  pull_request:
    branches:
      - dev

  workflow_dispatch:

permissions:
  contents: read

env:
  DB_CONNECTION: ${{ secrets.DB_CONNECTION }}

jobs:

# =====================================
# Backend Build
# =====================================

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore Solution
        run: dotnet restore backend/PriorAuthorization.sln

      - name: Build Solution
        run: dotnet build backend/PriorAuthorization.sln --configuration Release --no-restore

# =====================================
# Frontend Build
# =====================================

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Packages
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

# =====================================
# Docker Build
# =====================================

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    needs:
      - backend-build
      - frontend-build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: docker compose build

# =====================================
# Integration Environment
# =====================================

  integration-test:
    name: Docker Compose
    runs-on: ubuntu-latest

    needs:
      - docker-build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Containers
        run: docker compose up -d --build

      - name: Wait For Services
        run: sleep 30

# =====================================
# Health Checks
# =====================================

  health-check:
    name: Health Checks
    runs-on: ubuntu-latest

    needs:
      - integration-test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Containers
        run: docker compose up -d --build

      - name: Wait
        run: sleep 30

      - name: Specialist Health
        run: curl --fail http://localhost:5001/health

      - name: Manager Health
        run: curl --fail http://localhost:5002/health

      - name: Payer Health
        run: curl --fail http://localhost:5003/health

# =====================================
# Smoke Test
# =====================================

  smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest

    needs:
      - health-check

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Containers
        run: docker compose up -d --build

      - name: Wait
        run: sleep 30

      - name: API Health Endpoint
        run: curl --fail http://localhost:5001/health

      - name: Frontend Availability
        run: curl --fail http://localhost:5173

      - name: Stop Containers
        if: always()
        run: docker compose down