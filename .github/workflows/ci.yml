name: Prior Authorization CI Pipeline

on:
  push:
    branches:
      - saitharun

  pull_request:
    branches:
      - dev

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: ${{ secrets.DB_CONNECTION }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore Backend
        run: dotnet restore backend/PriorAuthorization.sln

      - name: Build Backend
        run: dotnet build backend/PriorAuthorization.sln --configuration Release --no-restore

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Build Docker Images
        run: docker compose build

      - name: Start Containers
        run: docker compose up -d

      - name: Wait for Containers
        run: sleep 30

      - name: Specialist Health Check
        run: curl --fail http://localhost:5001/health

      - name: Manager Health Check
        run: curl --fail http://localhost:5002/health

      - name: Payer Health Check
        run: curl --fail http://localhost:5003/health

      - name: Frontend Availability
        run: curl --fail http://localhost:5173

      - name: API Smoke Test
        run: curl --fail http://localhost:5001/health

      - name: Print Docker Logs
        if: failure()
        run: docker compose logs

      - name: Stop Containers
        if: always()
        run: docker compose down