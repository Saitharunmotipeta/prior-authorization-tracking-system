```yaml
name: Prior Authorization CI Pipeline

on:
  push:
    branches:
      - saitharun

  pull_request:
    branches:
      - dev

  workflow_dispatch:

permissions:
  contents: read

env:
  DB_CONNECTION: ${{ secrets.DB_CONNECTION }}

jobs:

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Solution
        run: dotnet restore backend/PriorAuthorization.sln

      - name: Build Solution
        run: dotnet build backend/PriorAuthorization.sln --configuration Release --no-restore

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm Packages
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    needs:
      - backend-build
      - frontend-build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Images
        run: docker compose build

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    needs:
      - docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Start Containers
        run: docker compose up -d --build

      - name: Wait for Services
        run: sleep 30

      - name: Specialist Health Check
        run: curl --fail http://localhost:5001/health

      - name: Manager Health Check
        run: curl --fail http://localhost:5002/health

      - name: Payer Health Check
        run: curl --fail http://localhost:5003/health

      - name: Frontend Availability
        run: curl --fail http://localhost:5173

      - name: Specialist API Smoke Test
        run: curl --fail http://localhost:5001/swagger/index.html

      - name: Print Docker Logs
        if: failure()
        run: docker compose logs

      - name: Stop Containers
        if: always()
        run: docker compose down
```
